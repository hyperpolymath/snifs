#
# cargo-deny: supply-chain gate for the Rust SNIF guest. Runs in CI alongside
# the source verifier. A SNIF guest pulls a deliberately tiny dependency tree
# (snif-abi + snif-logic + the no_std allocator), so this stays strict.
[advisories]
yanked = "deny"

[bans]
# A SNIF guest must not pull native/host-FFI crates — that would defeat the
# sandbox. Block the rustler stack outright as a tripwire.
deny = [
  { name = "rustler" },
  { name = "rustler_sys" },
]

[licenses]
# Mirror the estate posture; the guest crates are MPL-2.0.
allow = ["MPL-2.0", "Apache-2.0", "MIT", "Unicode-3.0"]
